apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-gcp-free-resource
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Bhanu88/argocd-crossplane-gcp-lab.git
    targetRevision: HEAD
    path: crossplane/gcp
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
