apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crossplane-gcp-free-resource
  namespace: argocd
spec:
  project: default
  source:
    # Replace with your Git repository containing this folder.
    repoURL: https://github.com/YOUR_GITHUB_USER/YOUR_REPO.git
    targetRevision: HEAD
    path: crossplane/gcp
  destination:
    server: https://kubernetes.default.svc
    namespace: crossplane-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
